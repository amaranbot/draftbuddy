<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Draft - DraftBuddy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #fff; min-height: 100vh; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid #1e2433; }
    .logo { font-size: 1.5rem; font-weight: 800; color: #4ade80; letter-spacing: -0.5px; text-decoration: none; }
    .back-link { color: #9ca3af; text-decoration: none; font-size: 0.9rem; }
    .back-link:hover { color: #fff; }
    .main { padding: 60px 40px; max-width: 700px; margin: 0 auto; }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #6b7280; margin-bottom: 40px; }
    .form-card { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 16px; padding: 40px; }
    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; font-size: 0.9rem; font-weight: 600; color: #9ca3af; margin-bottom: 8px; }
    .form-group input, .form-group select { width: 100%; padding: 12px 14px; background: #0f1117; border: 1px solid #2d3748; border-radius: 8px; color: #fff; font-size: 1rem; outline: none; transition: border-color 0.2s; }
    .form-group input:focus, .form-group select:focus { border-color: #4ade80; }
    .form-group select option { background: #1a1f2e; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .submit-btn { width: 100%; padding: 14px; background: #4ade80; color: #0f1117; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
    .submit-btn:hover { background: #22c55e; }
    .success-banner { background: #1a2d1a; border: 1px solid #4ade80; color: #4ade80; padding: 16px; border-radius: 8px; margin-bottom: 24px; display: none; font-weight: 600; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo">DraftBuddy</a>
    <a href="/dashboard" class="back-link">&#8592; Back to Dashboard</a>
  </nav>
  <div class="main">
    <h1>&#127944; New Draft</h1>
    <p class="subtitle">Set up your league and start your AI-powered draft.</p>
    <div class="success-banner" id="success-banner">&#9989; Draft setup saved! Your AI assistant is ready.</div>
    <div class="form-card">
      <form id="draft-form" onsubmit="handleDraftSubmit(event)">
        <div class="form-group">
          <label>League Name</label>
          <input type="text" id="league-name" placeholder="e.g. Monday Night Legends" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Sport</label>
            <select id="sport">
              <option value="nfl">NFL Football</option>
              <option value="nba">NBA Basketball</option>
              <option value="mlb">MLB Baseball</option>
              <option value="nhl">NHL Hockey</option>
            </select>
          </div>
          <div class="form-group">
            <label>Number of Teams</label>
            <select id="num-teams">
              <option value="8">8 Teams</option>
              <option value="10" selected>10 Teams</option>
              <option value="12">12 Teams</option>
              <option value="14">14 Teams</option>
              <option value="16">16 Teams</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Draft Type</label>
            <select id="draft-type">
              <option value="snake">Snake Draft</option>
              <option value="auction">Auction Draft</option>
              <option value="linear">Linear Draft</option>
            </select>
          </div>
          <div class="form-group">
            <label>Scoring Format</label>
            <select id="scoring">
              <option value="standard">Standard</option>
              <option value="ppr">PPR (Full Point)</option>
              <option value="half-ppr">Half PPR</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Your Draft Position</label>
          <select id="draft-position">
            <option value="1">Pick 1st</option><option value="2">Pick 2nd</option>
            <option value="3">Pick 3rd</option><option value="4">Pick 4th</option>
            <option value="5">Pick 5th</option><option value="6">Pick 6th</option>
            <option value="7">Pick 7th</option><option value="8">Pick 8th</option>
            <option value="9">Pick 9th</option><option value="10">Pick 10th</option>
            <option value="11">Pick 11th</option><option value="12">Pick 12th</option>
          </select>
        </div>
        <button type="submit" class="submit-btn">Start Draft Assistant &#9889;</button>
      </form>
    </div>
  </div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    const firebaseConfig = { apiKey: "AIzaSyBJq24N56L-6YeRj5we6VoA-diqWJnHd88", authDomain: "draftbuddy-cf5c9.firebaseapp.com", projectId: "draftbuddy-cf5c9", storageBucket: "draftbuddy-cf5c9.firebasestorage.app", messagingSenderId: "861425863011", appId: "1:861425863011:web:e6b8ee8525ba71f7de6b56" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    onAuthStateChanged(auth, (user) => { if (!user) window.location.href = '/login'; });
    window.handleDraftSubmit = function(e) {
      e.preventDefault();
      const banner = document.getElementById('success-banner');
      banner.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
  </script>
</body>
</html>
