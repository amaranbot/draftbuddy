    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    const firebaseConfig = { apiKey: "AIzaSyBJq24N56L-6YeRj5we6VoA-diqWJnHd88", authDomain: "draftbuddy-cf5c9.firebaseapp.com", projectId: "draftbuddy-cf5c9", storageBucket: "draftbuddy-cf5c9.firebasestorage.app", messagingSenderId: "861425863011", appId: "1:861425863011:web:e6b8ee8525ba71f7de6b56" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    onAuthStateChanged(auth, (user) => { if (user) window.location.href = "/dashboard"; });
    let currentTab = "signin";
    window.switchTab = function(tab) {
      currentTab = tab;
      const s = tab === "signin";
      document.getElementById("tab-signin").className = "tab" + (s ? " active" : "");
      document.getElementById("tab-signup").className = "tab" + (!s ? " active" : "");
      document.getElementById("card-title").textContent = s ? "Welcome back" : "Create account";
      document.getElementById("card-subtitle").textContent = s ? "Sign in to your DraftBuddy account" : "Join DraftBuddy for free";
      document.getElementById("submit-btn").textContent = s ? "Sign In" : "Create Account";
      document.getElementById("forgot-link").style.display = s ? "block" : "none";
      document.getElementById("error-msg").style.display = "none";
      document.getElementById("success-msg").style.display = "none";
    };
    window.handleSubmit = async function(e) {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const btn = document.getElementById("submit-btn");
      const errorEl = document.getElementById("error-msg");
      const successEl = document.getElementById("success-msg");
      errorEl.style.display = "none"; successEl.style.display = "none";
      btn.disabled = true;
      btn.textContent = currentTab === "signin" ? "Signing in..." : "Creating account...";
      try {
        if (currentTab === "signin") { await signInWithEmailAndPassword(auth, email, password); }
        else { await createUserWithEmailAndPassword(auth, email, password); }
        window.location.href = "/dashboard";
      } catch (err) {
        let msg = "Something went wrong. Please try again.";
        if (err.code === "auth/user-not-found" || err.code === "auth/wrong-password" || err.code === "auth/invalid-credential") msg = "Incorrect email or password.";
        else if (err.code === "auth/email-already-in-use") msg = "An account with this email already exists.";
        else if (err.code === "auth/weak-password") msg = "Password must be at least 6 characters.";
        else if (err.code === "auth/invalid-email") msg = "Please enter a valid email address.";
        else if (err.code === "auth/too-many-requests") msg = "Too many attempts. Please try again later.";
        errorEl.textContent = msg; errorEl.style.display = "block";
        btn.disabled = false; btn.textContent = currentTab === "signin" ? "Sign In" : "Create Account";
      }
    };
    window.handleForgotPassword = async function(e) {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const errorEl = document.getElementById("error-msg");
      const successEl = document.getElementById("success-msg");
      if (!email) { errorEl.textContent = "Enter your email first, then click Forgot password."; errorEl.style.display = "block"; return; }
      try { await sendPasswordResetEmail(auth, email); successEl.textContent = "Password reset email sent! Check your inbox."; successEl.style.display = "block"; errorEl.style.display = "none"; }
      catch (err) { errorEl.textContent = "Could not send reset email. Please try again."; errorEl.style.display = "block"; }
