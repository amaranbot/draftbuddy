<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - DraftBuddy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid #1e2433;
    }
    .logo { font-size: 1.5rem; font-weight: 800; color: #4ade80; letter-spacing: -0.5px; }
    .back-link { color: #9ca3af; text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    .back-link:hover { color: #fff; }
    .auth-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .auth-card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    .auth-card h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
    .auth-card p { color: #6b7280; margin-bottom: 28px; }
    .tab-buttons {
      display: flex;
      background: #0f1117;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 28px;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.2s;
      background: transparent;
      color: #6b7280;
    }
    .tab-btn.active {
      background: #4ade80;
      color: #0f1117;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 0.9rem;
      color: #9ca3af;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #4ade80; }
    .forgot-link {
      display: block;
      text-align: right;
      color: #6b7280;
      font-size: 0.85rem;
      text-decoration: none;
      margin-top: 6px;
      cursor: pointer;
    }
    .forgot-link:hover { color: #4ade80; }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #4ade80;
      color: #0f1117;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: #22c55e; }
    .submit-btn:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
    .error-msg {
      background: #2d1a1a;
      border: 1px solid #ef4444;
      color: #f87171;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }
    .success-msg {
      background: #1a2d1a;
      border: 1px solid #4ade80;
      color: #4ade80;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">DraftBuddy</div>
    <a href="/" class="back-link">&#8592; Back to home</a>
  </nav>
  <div class="auth-container">
    <div class="auth-card">
      <h1 id="card-title">Welcome back</h1>
      <p id="card-subtitle">Sign in to your DraftBuddy account</p>
      <div class="tab-buttons">
        <button class="tab-btn active" id="signin-tab" onclick="switchTab('signin')">Sign In</button>
        <button class="tab-btn" id="signup-tab" onclick="switchTab('signup')">Create Account</button>
      </div>
      <div class="error-msg" id="error-msg"></div>
      <div class="success-msg" id="success-msg"></div>
      <form id="auth-form" onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
          <a class="forgot-link" id="forgot-link" onclick="handleForgotPassword()">Forgot password?</a>
        </div>
        <button type="submit" class="submit-btn" id="submit-btn">Sign In</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBJq24N56L-6YeRj5we6VoA-diqWJnHd88",
      authDomain: "draftbuddy-cf5c9.firebaseapp.com",
      projectId: "draftbuddy-cf5c9",
      storageBucket: "draftbuddy-cf5c9.firebasestorage.app",
      messagingSenderId: "861425863011",
      appId: "1:861425863011:web:e6b8ee8525ba71f7de6b56",
      measurementId: "G-604N8R8K6T"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let currentTab = 'signin';

    // Redirect if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = '/dashboard';
      }
    });

    window.switchTab = function(tab) {
      currentTab = tab;
      const signinTab = document.getElementById('signin-tab');
      const signupTab = document.getElementById('signup-tab');
      const title = document.getElementById('card-title');
      const subtitle = document.getElementById('card-subtitle');
      const submitBtn = document.getElementById('submit-btn');
      const forgotLink = document.getElementById('forgot-link');
      const errorMsg = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      if (tab === 'signin') {
        signinTab.classList.add('active');
        signupTab.classList.remove('active');
        title.textContent = 'Welcome back';
        subtitle.textContent = 'Sign in to your DraftBuddy account';
        submitBtn.textContent = 'Sign In';
        forgotLink.style.display = 'block';
      } else {
        signupTab.classList.add('active');
        signinTab.classList.remove('active');
        title.textContent = 'Create account';
        subtitle.textContent = 'Join DraftBuddy and win your league';
        submitBtn.textContent = 'Create Account';
        forgotLink.style.display = 'none';
      }
    };

    window.handleSubmit = async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('submit-btn');
      const errorMsg = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Please wait...';

      try {
        if (currentTab === 'signin') {
          await signInWithEmailAndPassword(auth, email, password);
          window.location.href = '/dashboard';
        } else {
          await createUserWithEmailAndPassword(auth, email, password);
          window.location.href = '/dashboard';
        }
      } catch (err) {
        let msg = 'Something went wrong. Please try again.';
        if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
          msg = 'Invalid email or password.';
        } else if (err.code === 'auth/email-already-in-use') {
          msg = 'An account with this email already exists.';
        } else if (err.code === 'auth/weak-password') {
          msg = 'Password must be at least 6 characters.';
        } else if (err.code === 'auth/invalid-email') {
          msg = 'Please enter a valid email address.';
        } else if (err.code === 'auth/too-many-requests') {
          msg = 'Too many attempts. Please try again later.';
        }
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = currentTab === 'signin' ? 'Sign In' : 'Create Account';
      }
    };

    window.handleForgotPassword = async function() {
      const email = document.getElementById('email').value.trim();
      const errorMsg = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      if (!email) {
        errorMsg.textContent = 'Please enter your email address first.';
        errorMsg.style.display = 'block';
        return;
      }
      try {
        await sendPasswordResetEmail(auth, email);
        successMsg.textContent = 'Password reset email sent! Check your inbox.';
        successMsg.style.display = 'block';
      } catch (err) {
        errorMsg.textContent = 'Could not send reset email. Check the address and try again.';
        errorMsg.style.display = 'block';
      }
    };
  </script>
</body>
  </html>
