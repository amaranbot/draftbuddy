<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - DraftBuddy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid #1e2130; }
    .logo { font-size: 1.5rem; font-weight: 800; color: #4ade80; text-decoration: none; }
    .nav-back { color: #6b7280; text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    .nav-back:hover { color: #fff; }
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card { background: #161b27; border: 1px solid #1e2130; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
    .subtitle { color: #6b7280; font-size: 0.95rem; margin-bottom: 36px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #9ca3af; margin-bottom: 8px; letter-spacing: 0.3px; }
    input { width: 100%; background: #0f1117; border: 1px solid #2d3748; border-radius: 8px; padding: 12px 16px; color: #fff; font-size: 1rem; outline: none; transition: border-color 0.2s; }
    input::placeholder { color: #4b5563; }
    input:focus { border-color: #4ade80; }
    .forgot { display: block; text-align: right; font-size: 0.82rem; color: #6b7280; text-decoration: none; margin-top: 6px; transition: color 0.2s; }
    .forgot:hover { color: #9ca3af; }
    .btn { width: 100%; background: #4ade80; color: #000; border: none; border-radius: 8px; padding: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; transition: opacity 0.2s, transform 0.2s; }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: #374151; font-size: 0.85rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #1e2130; }
    .signup-link { text-align: center; font-size: 0.9rem; color: #6b7280; }
    .signup-link a { color: #4ade80; text-decoration: none; font-weight: 600; }
    .signup-link a:hover { text-decoration: underline; }
    footer { border-top: 1px solid #1e2130; padding: 20px 40px; text-align: center; color: #4b5563; font-size: 0.82rem; }
    @media (max-width: 480px) { .card { padding: 32px 24px; } nav { padding: 16px 20px; } }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo">DraftBuddy</a>
    <a href="/" class="nav-back">&#8592; Back to home</a>
  </nav>

  <main class="main">
    <div class="card">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your DraftBuddy account</p>

      <form>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
          <a href="#" class="forgot">Forgot password?</a>
        </div>
        <button type="submit" class="btn">Sign In</button>
      </form>

      <div class="divider">or</div>

      <p class="signup-link">Don't have an account? <a href="#">Sign up</a></p>
    </div>
  </main>

  <footer>
    <p>mydraftbuddy.com</p>
  </footer>
</body>
</html>
