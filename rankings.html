  {rank:78,name:"Miami Dolphins",team:"MIA",pos:"DST",adp:78,bye:6},
  {rank:79,name:"Philadelphia Eagles",team:"PHI",pos:"DST",adp:79,bye:5},
  {rank:80,name:"New York Jets",team:"NYJ",pos:"DST",adp:80,bye:12},
];

const players = NFL_PLAYERS;
const ROSTER = {
  standard: {QB:1,RB:2,WR:2,TE:1,K:1,DST:1,FLEX:1},
  ppr:      {QB:1,RB:2,WR:3,TE:1,K:1,DST:1,FLEX:1},
  'half-ppr':{QB:1,RB:2,WR:2,TE:1,K:1,DST:1,FLEX:1}
};

const rosterNeeds = ROSTER[scoring] || ROSTER.ppr;
const positions = Object.keys(rosterNeeds);

// ── State ─────────────────────────────────────────────────────────────
let draftedByMe = [];
let draftedByOthers = [];
let myPickCount = 0;
let currentFilter = 'ALL';

function getMyPickNumbers() {
  const picks = [];
  const rounds = numTeams * 3 + 3;
  for (let r = 1; r <= rounds; r++) {
    let pickInRound;
    if (draftType === 'snake') {
      pickInRound = (r % 2 === 1) ? myPick : (numTeams - myPick + 1);
    } else {
      pickInRound = myPick;
    }
    picks.push((r - 1) * numTeams + pickInRound);
  }
  return picks;
}

function getOverallPick() {
  return getMyPickNumbers()[myPickCount] || null;
}

function getRoundAndPick(overall) {
  const round = Math.ceil(overall / numTeams);
  const pick = overall - (round - 1) * numTeams;
  return { round, pick };
}

function getPositionNeeds() {
  const filled = {};
  draftedByMe.forEach(p => { filled[p.pos] = (filled[p.pos] || 0) + 1; });
  const needs = {};
  positions.forEach(pos => {
    const needed = rosterNeeds[pos] || 0;
    const have = filled[pos] || 0;
    needs[pos] = Math.max(0, needed - have);
  });
  return needs;
}

function getBestRecommendation() {
  const needs = getPositionNeeds();
  const available = players.filter(p => !draftedByMe.includes(p) && !draftedByOthers.includes(p));
  if (available.length === 0) return null;
  const neededPositions = Object.keys(needs).filter(pos => needs[pos] > 0);
  const totalRoundsLeft = Object.values(rosterNeeds).reduce((a,b) => a+b, 0) - myPickCount;
  let best = null, bestScore = -1;
  available.forEach(p => {
    let score = 100 - p.rank;
    if (neededPositions.includes(p.pos)) score += 30;
    if (p.pos === 'K' || p.pos === 'DST') {
      if (totalRoundsLeft > 4) score -= 40;
    }
    if (score > bestScore) { bestScore = score; best = p; }
  });
  return best;
}

function getRecommendationReason(player) {
  const needs = getPositionNeeds();
  const available = players.filter(p => !draftedByMe.includes(p) && !draftedByOthers.includes(p));
  const posNeeded = needs[player.pos] > 0;
  const rank = player.rank;
  if (posNeeded && rank <= 20) return 'Elite talent + your team needs ' + player.pos + '. Best available at a premium position.';
  if (posNeeded) return 'You still need a ' + player.pos + ' and this is the best one available.';
  if (rank <= 10) return 'Top-10 overall talent — too valuable to pass up regardless of position.';
  const nextAtPos = available.find(p => p.pos === player.pos && p.rank > player.rank);
  if (nextAtPos && nextAtPos.rank - player.rank > 12) return 'Significant drop-off at ' + player.pos + ' after this pick. Grab the value now.';
  return 'Strong overall value with good upside at pick ' + getOverallPick() + '.';
}

// ── Render Functions ──────────────────────────────────────────────────
function renderPosFilter() {
  const el = document.getElementById('pos-filter');
  const allPositions = ['ALL', ...new Set(players.map(p => p.pos))];
  el.innerHTML = allPositions.map(pos =>
    '<button class="pos-btn' + (currentFilter === pos ? ' active' : '') + '" onclick="setFilter('' + pos + '')">' + pos + '</button>'
  ).join('');
}

function renderNeeds() {
  const needs = getPositionNeeds();
  const el = document.getElementById('needs-grid');
  el.innerHTML = positions.map(pos => {
    const n = needs[pos];
    const filled = (rosterNeeds[pos] || 0) - n;
    let html = '<span class="need-tag ' + (n > 0 ? 'needed' : 'filled') + '" onclick="setFilter('' + pos + '')" title="' + filled + '/' + rosterNeeds[pos] + ' filled">';
    html += pos + ' ' + (n > 0 ? '(' + n + ')' : '&#10003;') + '</span>';
    return html;
  }).join('');
}

function renderPickInfo() {
  const overall = getOverallPick();
  if (overall === null) {
    document.getElementById('pick-display').textContent = 'Draft complete!';
    return;
  }
  const { round, pick } = getRoundAndPick(overall);
  document.getElementById('pick-display').textContent = 'Round ' + round + ', Pick ' + pick + ' (Overall #' + overall + ')';
}

function renderAIRec() {
  const rec = getBestRecommendation();
  const el = document.getElementById('ai-rec');
  if (!rec) { el.innerHTML = '<div class="empty-state">Draft complete!</div>'; return; }
  const reason = getRecommendationReason(rec);
  el.innerHTML = '<div class="rec-card">' +
    '<div class="rec-label">&#9733; BEST AVAILABLE</div>' +
    '<div class="rec-player">' + rec.name + '</div>' +
    '<div class="rec-pos">' + rec.pos + ' · ' + rec.team + ' · BYE ' + rec.bye + ' · Rank #' + rec.rank + '</div>' +
    '<div class="rec-why">' + reason + '</div>' +
    '<div style="margin-top:12px"><button class="draft-btn" onclick="draftPlayer(' + rec.rank + ', true)">Draft ' + rec.name.split(' ').pop() + ' &#10003;</button></div>' +
    '</div>';
}

function renderMyPicks() {
  const el = document.getElementById('my-picks');
  document.getElementById('pick-count').textContent = draftedByMe.length;
  if (draftedByMe.length === 0) { el.innerHTML = '<div class="empty-state">No picks yet</div>'; return; }
  el.innerHTML = draftedByMe.map((p, i) => {
    const overall = getMyPickNumbers()[i];
    const { round } = getRoundAndPick(overall || 1);
    return '<div class="my-pick-item">' +
      '<span class="my-pick-pos">' + p.pos + '</span>' +
      '<span style="flex:1;padding:0 10px">' + p.name + '</span>' +
      '<span style="font-size:0.75rem;color:#6b7280">R' + round + '</span>' +
      '</div>';
  }).join('');
}

function renderPlayerList() {
  const search = document.getElementById('search').value.toLowerCase();
  const filtered = players.filter(p => {
    const matchPos = currentFilter === 'ALL' || p.pos === currentFilter;
    const matchSearch = p.name.toLowerCase().includes(search) || p.team.toLowerCase().includes(search);
    return matchPos && matchSearch;
  });
  const rec = getBestRecommendation();
  const el = document.getElementById('player-list');
  if (filtered.length === 0) { el.innerHTML = '<div class="empty-state">No players found</div>'; return; }
  el.innerHTML = filtered.map(p => {
    const isDraftedByMe = draftedByMe.includes(p);
    const isDraftedByOther = draftedByOthers.includes(p);
    const isDrafted = isDraftedByMe || isDraftedByOther;
    const isRec = rec && rec.rank === p.rank && !isDrafted;
    let rowClass = 'player-row';
    if (isDrafted) rowClass += ' drafted';
    if (isRec) rowClass += ' recommended';
    let actionBtn = '';
    if (isDraftedByMe) {
      actionBtn = '<span class="drafted-badge">Your pick</span>';
    } else if (isDraftedByOther) {
      actionBtn = '<span class="drafted-badge">Drafted</span>';
    } else {
      actionBtn = '<button class="pick-action mine" onclick="draftPlayer(' + p.rank + ', true)">My Pick</button>' +
        ' <button class="pick-action" onclick="draftPlayer(' + p.rank + ', false)">Opponent</button>';
    }
    return '<div class="' + rowClass + '">' +
      '<span class="player-rank">' + (isRec ? '&#11088;' : p.rank) + '</span>' +
      '<span class="player-pos-badge pos-' + p.pos + '">' + p.pos + '</span>' +
      '<span class="player-name">' + p.name + '<br><span class="player-team">' + p.team + ' · BYE ' + p.bye + '</span></span>' +
      '<span class="player-adp">ADP ' + p.adp + '</span>' +
      actionBtn +
      '</div>';
  }).join('');
}

function renderAll() {
  renderPosFilter();
  renderNeeds();
  renderPickInfo();
  renderAIRec();
  renderMyPicks();
  renderPlayerList();
}

// ── Actions ───────────────────────────────────────────────────────────
window.draftPlayer = function(rank, isMyPick) {
  const player = players.find(p => p.rank === rank);
  if (!player) return;
  if (draftedByMe.includes(player) || draftedByOthers.includes(player)) return;
  if (isMyPick) {
    draftedByMe.push(player);
    myPickCount++;
  } else {
    draftedByOthers.push(player);
  }
  renderAll();
};

window.setFilter = function(pos) {
  currentFilter = pos;
  renderAll();
};

window.filterPlayers = renderPlayerList;

// ── Init ──────────────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
