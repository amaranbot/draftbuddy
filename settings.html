<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - DraftBuddy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #fff; min-height: 100vh; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid #1e2433; }
    .logo { font-size: 1.5rem; font-weight: 800; color: #4ade80; letter-spacing: -0.5px; text-decoration: none; }
    .back-link { color: #9ca3af; text-decoration: none; font-size: 0.9rem; }
    .back-link:hover { color: #fff; }
    .main { padding: 60px 40px; max-width: 700px; margin: 0 auto; }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #6b7280; margin-bottom: 40px; }
    .section { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 16px; padding: 32px; margin-bottom: 24px; }
    .section h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid #2d3748; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.9rem; font-weight: 600; color: #9ca3af; margin-bottom: 8px; }
    .form-group input, .form-group select { width: 100%; padding: 12px 14px; background: #0f1117; border: 1px solid #2d3748; border-radius: 8px; color: #fff; font-size: 1rem; outline: none; transition: border-color 0.2s; }
    .form-group input:focus, .form-group select:focus { border-color: #4ade80; }
    .form-group select option { background: #1a1f2e; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .save-btn { background: #4ade80; color: #0f1117; border: none; padding: 12px 28px; border-radius: 8px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .save-btn:hover { background: #22c55e; }
    .danger-btn { background: transparent; color: #ef4444; border: 1px solid #ef4444; padding: 12px 28px; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .danger-btn:hover { background: #ef4444; color: #fff; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1a2d1a; border: 1px solid #4ade80; color: #4ade80; padding: 14px 20px; border-radius: 10px; font-weight: 600; display: none; z-index: 999; }
    .email-display { color: #e5e7eb; font-size: 0.95rem; padding: 12px 0; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo">DraftBuddy</a>
    <a href="/dashboard" class="back-link">&#8592; Back to Dashboard</a>
  </nav>
  <div class="main">
    <h1>&#9881;&#65039; Settings</h1>
    <p class="subtitle">Configure your league preferences and account.</p>
    <div class="section">
      <h2>League Defaults</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Default Sport</label>
          <select id="default-sport">
            <option value="nfl">NFL Football</option>
            <option value="nba">NBA Basketball</option>
            <option value="mlb">MLB Baseball</option>
            <option value="nhl">NHL Hockey</option>
          </select>
        </div>
        <div class="form-group">
          <label>Default League Size</label>
          <select id="default-size">
            <option value="8">8 Teams</option>
            <option value="10" selected>10 Teams</option>
            <option value="12">12 Teams</option>
            <option value="14">14 Teams</option>
            <option value="16">16 Teams</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Default Scoring</label>
          <select id="default-scoring">
            <option value="standard">Standard</option>
            <option value="ppr">PPR (Full Point)</option>
            <option value="half-ppr">Half PPR</option>
          </select>
        </div>
        <div class="form-group">
          <label>Default Draft Type</label>
          <select id="default-draft-type">
            <option value="snake">Snake Draft</option>
            <option value="auction">Auction Draft</option>
            <option value="linear">Linear Draft</option>
          </select>
        </div>
      </div>
      <button class="save-btn" onclick="saveSettings()">Save Preferences</button>
    </div>
    <div class="section">
      <h2>Account</h2>
      <div class="form-group">
        <label>Email Address</label>
        <div class="email-display" id="account-email">Loading...</div>
      </div>
      <button class="danger-btn" onclick="handleSignOut()">Sign Out</button>
    </div>
  </div>
  <div class="toast" id="toast">&#9989; Settings saved!</div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    const firebaseConfig = { apiKey: "AIzaSyBJq24N56L-6YeRj5we6VoA-diqWJnHd88", authDomain: "draftbuddy-cf5c9.firebaseapp.com", projectId: "draftbuddy-cf5c9", storageBucket: "draftbuddy-cf5c9.firebasestorage.app", messagingSenderId: "861425863011", appId: "1:861425863011:web:e6b8ee8525ba71f7de6b56" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = '/login'; return; }
      document.getElementById('account-email').textContent = user.email;
    });
    window.saveSettings = function() {
      const toast = document.getElementById('toast');
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 3000);
    };
    window.handleSignOut = async function() {
      await signOut(auth);
      window.location.href = '/login';
    };
  </script>
</body>
</html>
